<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OnlyFansOne helps creators, brands, and marketing teams grow across Instagram, YouTube, TikTok, Facebook, Threads, X, and more with audience growth, content visibility, views, and engagement support.">
  <title>OnlyFansOne | Social Media Growth & Content Visibility Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&family=Noto+Serif+TC:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
:root {
  --ink: #171816;
  --muted: #666962;
  --line: #dfe1da;
  --paper: #f6f7f2;
  --white: #ffffff;
  --coral: #ff5f49;
  --coral-dark: #d93e2a;
  --teal: #0d8f7a;
  --teal-soft: #dff4ef;
  --yellow: #ffd65a;
  --blue: #3377d4;
  --shadow: 0 18px 45px rgba(23, 24, 22, .09);
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  color: var(--ink);
  background: var(--paper);
  font-family: "Noto Sans TC", system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.65;
  letter-spacing: 0;
}
button, input, select, textarea { font: inherit; }
button, a { -webkit-tap-highlight-color: transparent; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }
.container { width: min(1160px, calc(100% - 40px)); margin: 0 auto; }
.eyebrow { color: var(--teal); font-size: 12px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
.section { padding: 92px 0; }
.section-head { display: flex; align-items: end; justify-content: space-between; gap: 24px; margin-bottom: 34px; }
.section-head h2, .page-title h1 { margin: 5px 0 0; font-size: clamp(30px, 4vw, 52px); line-height: 1.12; letter-spacing: 0; }
.section-head p { max-width: 500px; margin: 0; color: var(--muted); }
.muted { color: var(--muted); }
.small { font-size: 13px; }
.top-strip {
  padding: 7px 20px;
  color: #fff;
  background: var(--ink);
  text-align: center;
  font-size: 12px;
}
.nav {
  position: sticky; top: 0; z-index: 20;
  border-bottom: 1px solid rgba(223, 225, 218, .85);
  background: rgba(246, 247, 242, .94);
  backdrop-filter: blur(14px);
}
.nav-inner { min-height: 70px; display: flex; align-items: center; gap: 25px; }
.brand { display: inline-flex; align-items: center; gap: 9px; margin-right: auto; font-size: 20px; font-weight: 900; }
.brand-mark { width: 30px; height: 30px; display: grid; place-items: center; color: #fff; background: var(--coral); border-radius: 7px; font-size: 16px; transform: rotate(-4deg); }
.nav-links { display: flex; align-items: center; gap: 22px; font-size: 14px; font-weight: 600; }
.nav-actions { display: flex; gap: 8px; }
.menu-button { display: none; }
.btn {
  min-height: 44px; padding: 10px 18px; border: 1px solid var(--ink); border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  color: #fff; background: var(--ink); cursor: pointer; font-weight: 800; transition: .2s ease;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(23, 24, 22, .15); }
.btn:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-secondary { color: var(--ink); background: transparent; border-color: var(--line); }
.btn-coral { color: #fff; background: var(--coral); border-color: var(--coral); }
.btn-teal { color: #fff; background: var(--teal); border-color: var(--teal); }
.btn-icon { width: 42px; padding: 0; }
.hero { position: relative; min-height: 690px; overflow: hidden; background: #d6d8cf; }
.hero-image { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(246,247,242,.98) 0%, rgba(246,247,242,.91) 38%, rgba(246,247,242,.18) 68%, rgba(246,247,242,0) 100%); }
.hero-content { position: relative; z-index: 1; padding: 110px 0 80px; }
.hero-copy { max-width: 630px; }
.hero h1 { margin: 12px 0 20px; font-size: clamp(48px, 7vw, 88px); line-height: .98; letter-spacing: 0; }
.hero h1 span { color: var(--coral); }
.hero p { max-width: 560px; color: #454741; font-size: 17px; }
.hero-actions { display: flex; gap: 10px; margin: 30px 0 52px; }
.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; width: min(640px, 100%); background: rgba(23,24,22,.18); border: 1px solid rgba(23,24,22,.18); }
.metric { padding: 15px 18px; background: rgba(255,255,255,.72); backdrop-filter: blur(8px); }
.metric b { display: block; font-size: 23px; line-height: 1.2; }
.metric span { color: var(--muted); font-size: 12px; }
.trust-band { padding: 18px 0; color: #fff; background: var(--teal); }
.trust-row { display: flex; justify-content: space-between; gap: 20px; font-size: 13px; font-weight: 700; }
.trust-row span { display: flex; align-items: center; gap: 8px; }
.check { width: 20px; height: 20px; display: inline-grid; place-items: center; border: 1px solid rgba(255,255,255,.6); border-radius: 50%; }
.platform-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.platform-card {
  min-height: 195px; padding: 22px; border: 1px solid var(--line); border-radius: 8px;
  display: flex; flex-direction: column; background: var(--white); transition: .2s ease;
}
.platform-card:hover { transform: translateY(-4px); border-color: var(--ink); box-shadow: var(--shadow); }
.platform-icon { width: 44px; height: 44px; display: grid; place-items: center; border-radius: 7px; color: #fff; background: var(--ink); font-size: 20px; font-weight: 900; }
.platform-card h3 { margin: 19px 0 2px; font-size: 18px; }
.platform-card p { margin: 0 0 20px; color: var(--muted); font-size: 13px; }
.platform-card .card-link { margin-top: auto; font-size: 13px; font-weight: 800; }
.platform-card .card-link::after { content: " →"; color: var(--coral); }
.platform-card.featured { color: #fff; background: var(--ink); border-color: var(--ink); }
.platform-card.featured p { color: #c7c9c3; }
.value-band { background: var(--ink); color: #fff; }
.value-layout { display: grid; grid-template-columns: 1.05fr 1fr; gap: 70px; align-items: center; }
.value-layout h2 { margin: 10px 0 22px; font-size: clamp(34px, 5vw, 60px); line-height: 1.05; }
.value-layout p { color: #c5c8c0; }
.value-list { display: grid; gap: 12px; }
.value-item { padding: 23px; border: 1px solid #393b37; border-radius: 7px; display: grid; grid-template-columns: 42px 1fr; gap: 15px; }
.value-number { color: var(--yellow); font-size: 13px; font-weight: 900; }
.value-item h3 { margin: 0 0 3px; font-size: 17px; }
.value-item p { margin: 0; font-size: 13px; }
.industry-list { display: flex; flex-wrap: wrap; gap: 9px; }
.industry-list span { padding: 10px 14px; border: 1px solid var(--line); border-radius: 6px; background: #fff; font-size: 13px; font-weight: 700; }
.testimonial-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.quote-card { padding: 25px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
.stars { color: #e4a700; letter-spacing: .12em; }
.quote-card blockquote { min-height: 105px; margin: 18px 0 25px; font-size: 16px; font-weight: 600; }
.quote-card footer { color: var(--muted); font-size: 12px; }
.steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border-top: 1px solid var(--ink); }
.step { padding: 28px 25px 0 0; }
.step-num { width: 32px; height: 32px; display: grid; place-items: center; color: #fff; background: var(--coral); border-radius: 50%; font-weight: 800; }
.step h3 { margin: 20px 0 5px; }
.cta-band { padding: 70px 0; color: #171816; background: var(--yellow); }
.cta-inner { display: flex; align-items: center; justify-content: space-between; gap: 30px; }
.cta-inner h2 { margin: 0; font-size: clamp(30px, 5vw, 58px); line-height: 1.05; }
.footer { padding: 65px 0 25px; color: #fff; background: #171816; }
.footer-grid { display: grid; grid-template-columns: 1.4fr repeat(3, 1fr); gap: 50px; }
.footer h4 { margin: 0 0 15px; font-size: 13px; }
.footer a { display: block; margin: 8px 0; color: #b9bcb4; font-size: 13px; }
.footer .brand { margin-bottom: 15px; }
.footer p { color: #b9bcb4; font-size: 13px; }
.footer-bottom { margin-top: 50px; padding-top: 18px; border-top: 1px solid #393b37; display: flex; justify-content: space-between; color: #8e918a; font-size: 11px; }
.page-title { padding: 70px 0 42px; border-bottom: 1px solid var(--line); }
.page-title p { max-width: 650px; color: var(--muted); }
.panel { border: 1px solid var(--line); border-radius: 8px; background: #fff; }
.order-shell { display: grid; grid-template-columns: minmax(0, 1.65fr) minmax(280px, .75fr); gap: 20px; align-items: start; }
.order-main { padding: 28px; }
.order-side { position: sticky; top: 90px; padding: 22px; }
.progress { display: flex; align-items: center; gap: 6px; margin-bottom: 28px; }
.progress span { height: 5px; flex: 1; background: var(--line); border-radius: 2px; }
.progress span.active { background: var(--coral); }
.field-label { display: block; margin: 0 0 9px; font-size: 13px; font-weight: 800; }
.choice-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 25px; }
.choice, .plan-choice {
  padding: 13px; border: 1px solid var(--line); border-radius: 6px; background: #fff;
  color: var(--ink); text-align: left; cursor: pointer; transition: .15s ease;
}
.choice:hover, .choice.selected, .plan-choice:hover, .plan-choice.selected { border-color: var(--teal); background: var(--teal-soft); }
.choice b { display: block; }
.choice small, .plan-choice small { color: var(--muted); }
.select {
  width: 100%; height: 48px; padding: 0 13px; border: 1px solid var(--line); border-radius: 6px; color: var(--ink); background: #fff;
}
.plan-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
.plan-choice b, .plan-choice span { display: block; }
.plan-choice span { color: var(--coral-dark); font-weight: 800; }
.custom-quantity {
  margin-top: 10px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 7px;
  display: grid;
  grid-template-columns: 1fr minmax(180px, 260px);
  gap: 10px;
  align-items: center;
  background: #fff;
  transition: .15s ease;
}
.custom-quantity.selected { border-color: var(--teal); background: var(--teal-soft); }
.custom-quantity .field-label { margin: 0; }
.custom-quantity small { grid-column: 1 / -1; color: var(--coral-dark); font-weight: 800; }
.custom-quantity small:empty { display: none; }
.tag { display: inline-flex; padding: 3px 7px; border-radius: 4px; color: #fff; background: var(--coral); font-size: 10px; font-weight: 800; }
.summary-row { padding: 11px 0; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; gap: 15px; font-size: 13px; }
.summary-total { padding: 20px 0; display: flex; align-items: center; justify-content: space-between; }
.summary-total b:last-child { font-size: 25px; color: var(--coral-dark); }
.notice { margin: 24px 0; padding: 16px; border-left: 3px solid var(--yellow); background: #fff9df; color: #5b502d; font-size: 12px; }
.checkout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.form-group { margin-bottom: 16px; }
.form-group.full { grid-column: 1 / -1; }
.input { width: 100%; min-height: 48px; padding: 11px 13px; border: 1px solid var(--line); border-radius: 6px; background: #fff; }
.input:focus, .select:focus { outline: 2px solid rgba(13,143,122,.18); border-color: var(--teal); }
.radio-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.radio-card { position: relative; padding: 15px; border: 1px solid var(--line); border-radius: 6px; cursor: pointer; }
.radio-card:has(input:checked) { border-color: var(--teal); background: var(--teal-soft); }
.radio-card input { position: absolute; opacity: 0; }
.check-row { display: flex; align-items: flex-start; gap: 9px; margin: 12px 0; font-size: 13px; }
.success-box { padding: 60px 20px; text-align: center; }
.success-icon { width: 68px; height: 68px; margin: 0 auto 20px; display: grid; place-items: center; color: #fff; background: var(--teal); border-radius: 50%; font-size: 30px; }
.toolbar { margin-bottom: 18px; display: grid; grid-template-columns: 1fr 220px; gap: 10px; }
.service-table { width: 100%; border-collapse: collapse; background: #fff; font-size: 13px; }
.service-table th, .service-table td { padding: 15px 13px; border-bottom: 1px solid var(--line); text-align: left; }
.service-table th { position: sticky; top: 70px; color: var(--muted); background: #f0f1ec; font-size: 11px; }
.service-table td:nth-child(2) { color: var(--muted); }
.service-table td:nth-child(4) { color: var(--coral-dark); font-weight: 800; white-space: nowrap; }
.faq-list { border-top: 1px solid var(--line); }
.faq-item { border-bottom: 1px solid var(--line); }
.faq-question { width: 100%; padding: 22px 0; border: 0; display: flex; justify-content: space-between; color: var(--ink); background: transparent; text-align: left; cursor: pointer; font-weight: 800; }
.faq-answer { display: none; max-width: 800px; padding: 0 0 22px; color: var(--muted); }
.faq-item.open .faq-answer { display: block; }
.contact-layout, .about-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
.contact-card { padding: 30px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
.contact-card h3 { margin-top: 0; }
.contact-qr {
  width: min(320px, 100%);
  margin: 28px auto 0;
  border-radius: 8px;
}
.contact-points { display: grid; gap: 8px; margin: 25px 0; }
.contact-points span { padding: 10px 0; border-bottom: 1px solid var(--line); }
.auth-wrap { min-height: 650px; display: grid; place-items: center; padding: 70px 20px; }
.auth-panel { width: min(440px, 100%); padding: 34px; }
.auth-panel h1 { margin: 0 0 5px; }
.auth-panel .btn { width: 100%; margin-top: 8px; }
.auth-links { margin-top: 18px; display: flex; justify-content: space-between; color: var(--teal); font-size: 13px; font-weight: 700; }
.legal { max-width: 800px; }
.legal h2 { margin-top: 38px; }
.toast {
  position: fixed; right: 22px; bottom: 22px; z-index: 100;
  max-width: 340px; padding: 13px 17px; color: #fff; background: var(--ink); border-radius: 6px;
  box-shadow: var(--shadow); opacity: 0; transform: translateY(12px); pointer-events: none; transition: .25s ease;
}
.toast.show { opacity: 1; transform: translateY(0); }

@media (max-width: 900px) {
  .nav-links { display: none; position: absolute; top: 70px; left: 0; right: 0; padding: 20px; background: var(--paper); border-bottom: 1px solid var(--line); flex-direction: column; align-items: flex-start; }
  .nav-links.open { display: flex; }
  .nav-actions .btn-secondary { display: none; }
  .nav-actions .menu-button { display: inline-flex; }
  .hero { min-height: 760px; }
  .hero-image { object-position: 68% center; }
  .hero-overlay { background: linear-gradient(180deg, rgba(246,247,242,.96) 0%, rgba(246,247,242,.85) 55%, rgba(246,247,242,.15) 100%); }
  .hero-content { padding-top: 75px; }
  .platform-grid, .testimonial-grid { grid-template-columns: repeat(2, 1fr); }
  .value-layout, .contact-layout, .about-layout, .order-shell { grid-template-columns: 1fr; }
  .order-side { position: static; }
  .footer-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 620px) {
  .container { width: min(100% - 28px, 1160px); }
  .section { padding: 62px 0; }
  .nav-inner { min-height: 62px; gap: 8px; }
  .nav-actions .btn { min-height: 38px; padding: 7px 10px; font-size: 12px; }
  .brand { font-size: 17px; }
  .hero { min-height: 720px; }
  .hero h1 { font-size: 49px; }
  .hero-copy p { font-size: 14px; }
  .hero-actions { margin: 22px 0 38px; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .trust-row { display: grid; grid-template-columns: 1fr 1fr; }
  .section-head, .cta-inner { align-items: flex-start; flex-direction: column; }
  .section-head h2 { font-size: 34px; }
  .platform-grid, .testimonial-grid, .steps, .plan-grid, .choice-grid, .checkout-grid, .radio-row { grid-template-columns: 1fr; }
  .custom-quantity { grid-template-columns: 1fr; }
  .platform-card { min-height: 160px; }
  .footer-grid { grid-template-columns: 1fr; gap: 30px; }
  .footer-bottom { flex-direction: column; gap: 8px; }
  .order-main { padding: 18px; }
  .toolbar { grid-template-columns: 1fr; }
  .table-wrap { overflow-x: auto; }
  .service-table { min-width: 760px; }
}

/* Editorial product style */
:root {
  --ink: #181816;
  --muted: #77766f;
  --line: #e5e3dc;
  --paper: #faf9f5;
  --white: #ffffff;
  --coral: #e5601a;
  --coral-dark: #c94f12;
  --teal: #277c68;
  --teal-soft: #edf5f1;
  --yellow: #f3d77f;
  --shadow: 0 12px 40px rgba(35, 31, 24, .06);
}

body { background: var(--paper); font-weight: 400; }
.top-strip {
  display: block;
  padding: 7px 20px;
  color: #fff;
  background: var(--ink);
  text-align: center;
  font-size: 12px;
}
.container { width: min(1200px, calc(100% - 48px)); }
.nav { background: rgba(250, 249, 245, .92); border-color: transparent; }
.nav-inner { min-height: 68px; }
.brand { gap: 10px; font-size: 20px; font-weight: 700; }
.brand-mark { width: 19px; height: 19px; border-radius: 50%; background: var(--ink); color: transparent; transform: none; }
.nav-links { position: absolute; left: 50%; transform: translateX(-50%); gap: 30px; color: #55544f; font-size: 13px; font-weight: 500; white-space: nowrap; }
.btn { min-height: 42px; padding: 9px 19px; border-radius: 100px; font-size: 13px; font-weight: 600; }
.btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(23, 24, 22, .1); }
.btn-coral { background: var(--ink); border-color: var(--ink); }
.btn-teal { background: var(--ink); border-color: var(--ink); }
.lang-toggle {
  min-width: 54px;
  color: var(--ink);
  background: transparent;
  border-color: var(--line);
}
.eyebrow { color: var(--coral); letter-spacing: .06em; font-size: 11px; font-weight: 600; text-transform: none; }
.section { padding: 120px 0; }
.section-head { align-items: start; margin-bottom: 50px; }
.section-head h2, .page-title h1, .value-layout h2, .cta-inner h2, .contact-layout h2 {
  font-family: "Noto Serif TC", serif;
  font-weight: 600;
}
.section-head h2 { max-width: 660px; font-size: clamp(35px, 4vw, 56px); }

.hero { min-height: auto; padding: 78px 0 90px; background: var(--paper); }
.hero-content { padding: 0; text-align: center; }
.hero-copy { max-width: 850px; margin: 0 auto; }
.hero h1 { max-width: 800px; margin: 20px auto 16px; font-family: "Noto Serif TC", serif; font-size: clamp(42px, 5.3vw, 70px); font-weight: 600; line-height: 1.28; }
.hero h1 span { color: var(--coral); }
.hero p { max-width: 620px; margin: 0 auto; color: var(--muted); font-size: 15px; }
.growth-console { max-width: 900px; min-height: 245px; margin: 48px auto 16px; padding: 20px; border: 1px solid #dedcd5; border-radius: 11px; display: flex; flex-direction: column; justify-content: space-between; background: #fff; box-shadow: var(--shadow); text-align: left; }
.console-input { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; min-height: 125px; padding: 6px 5px; }
.console-prompt { max-width: 650px; color: #9b9992; font-size: 18px; line-height: 1.6; }
.console-send { width: 34px; height: 34px; flex: 0 0 auto; display: grid; place-items: center; border-radius: 50%; color: #fff; background: var(--ink); font-size: 20px; line-height: 1; }
.console-tools { display: flex; align-items: center; gap: 7px; overflow-x: auto; padding-top: 12px; border-top: 1px solid #f0eee8; scrollbar-width: none; }
.console-tools::-webkit-scrollbar { display: none; }
.console-tools a, .tool-add { height: 31px; padding: 4px 10px; border: 1px solid var(--line); border-radius: 100px; display: inline-flex; flex: 0 0 auto; align-items: center; gap: 6px; color: #55544f; background: #fff; font-size: 11px; }
.console-tools a:hover { border-color: #aaa79f; }
.console-tools i { width: 14px; height: 14px; display: grid; place-items: center; border-radius: 4px; color: #fff; font-size: 8px; font-style: normal; }
.tool-add { width: 31px; justify-content: center; padding: 0; font-size: 17px; }
.quick-workflows { max-width: 900px; margin: 48px auto 0; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: left; }
.quick-workflows a { min-height: 128px; padding: 18px; border: 1px solid var(--line); border-radius: 9px; display: flex; flex-direction: column; justify-content: space-between; background: transparent; transition: .2s ease; }
.quick-workflows a:hover { background: #fff; border-color: #c8c5bd; transform: translateY(-2px); }
.workflow-head { display: flex; align-items: center; gap: 10px; }
.workflow-logo {
  width: 30px;
  height: 30px;
  border-radius: 9px;
  display: inline-grid;
  flex: 0 0 auto;
  place-items: center;
  color: #fff;
  background: var(--logo-color, var(--ink));
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.18);
}

function serviceRows() {
  const c = t();

  return Array.from({ length: 22 }, (_, i) => {

    const suffix = c.serviceSuffixes[i % c.serviceSuffixes.length];
    return { category: `${platform} ${suffix.split(" | ")[0]}`, id: 2101 + i, name: `${platform} ${suffix}`, price: (0.42 + i * .08).toFixed(2), min: [50, 100, 500][i % 3], max: [10000, 50000, 100000][i % 3] };
  });
}
function money(value) { return `${t().currency} ${Number(value).toLocaleString("en-US")}`; }
function quantity(value) { return Number(value || 0).toLocaleString("en-US"); }
function planForQuantity(value, custom = false) {
  const qty = Math.max(1, Math.round(Number(value) || 0));
  const exact = plans.find(plan => plan.qty === qty);
  if (exact) return { ...exact, custom };
  const tier = plans.reduce((best, plan) => (plan.qty <= qty ? plan : best), plans[0]);
  const price = Math.max(1, Math.ceil((tier.price / tier.qty) * qty));
  const original = Math.max(price + 1, Math.ceil((tier.original / tier.qty) * qty));
  return { qty, price, original, custom: true };
}

          <div class="hero-actions"><a href="/guest/marketing-plans" data-link class="btn btn-coral">${h.primary}</a><a href="/user/services" data-link class="btn btn-secondary">${h.secondary}</a></div>
          <div class="quick-workflows">
            ${h.workflows.map(([platform, title, desc]) => `<a href="/guest/marketing-plans?type=${encodeURIComponent(platform)}" data-link data-platform="${platform}"><span class="workflow-head">${platformLogo(platform)}<b>${title}</b></span><span>${desc} -></span></a>`).join("")}
          </div>

      <div class="trust-band"><div class="container trust-row">${h.metrics.map(x => `<span><b class="count-up" data-count="${x[0]}">0</b><small>${x[1]}</small></span>`).join("")}</div></div>
      <section class="section" id="services"><div class="container"><div class="section-head"><div><span class="eyebrow">${h.servicesEyebrow}</span><h2>${h.servicesTitle}</h2></div><p>${h.servicesDescription}</p></div><div class="platform-grid">${platformCards()}</div></div></section>
      <section class="section value-band"><div class="container value-layout"><div><span class="eyebrow" style="color:#e5601a">${h.whyEyebrow}</span><h2>${h.whyTitle}</h2><p>${h.whyDescription}</p><a href="/about" data-link class="btn btn-coral">${h.whyButton}</a></div><div class="value-list">${h.values.map((x,i)=>`<div class="value-item"><span class="value-number">${String(i+1).padStart(2,"0")}</span><div><h3>${x[0]}</h3><p>${x[1]}</p></div></div>`).join("")}</div></div></section>
      <section class="section"><div class="container"><div class="section-head"><div><span class="eyebrow">${h.teamsEyebrow}</span><h2>${h.teamsTitle}</h2></div></div><div class="industry-list">${h.teams.map(x => `<span>${x}</span>`).join("")}</div></div></section>
      <section class="section" id="testimonials"><div class="container"><div class="section-head"><div><span class="eyebrow">${h.reviewsEyebrow}</span><h2>${h.reviewsTitle}</h2></div><a href="/contact" data-link class="btn btn-secondary">${h.leaveReview}</a></div><div class="testimonial-grid">${h.reviews.map(x => `<article class="quote-card"><div class="stars">★★★★★</div><blockquote>“${x[1]}”<br><span class="muted small">${x[2]}</span></blockquote><footer>${x[0]}</footer></article>`).join("")}</div></div></section>
      <section class="section"><div class="container"><div class="section-head"><div><span class="eyebrow">${h.processEyebrow}</span><h2>${h.processTitle}</h2></div></div><div class="steps">${h.steps.map((x,i)=>`<div class="step"><span class="step-num">${i+1}</span><h3>${x[0]}</h3><p class="muted">${x[1]}</p></div>`).join("")}</div></div></section>
    </main>`;
}

function guestPage() {
  const c = t();
  if (state.complete) return `<main class="section"><div class="container"><div class="panel success-box"><div class="success-icon">✓</div><span class="eyebrow">${c.order.received}</span><h1>${c.order.successTitle}</h1><p class="muted">${c.order.successText.replace("{order}", Date.now().toString().slice(-8))}</p><a href="/" data-link class="btn">${c.order.backHome}</a></div></div></main>`;
  const itemOptions = itemsByPlatform()[state.platform] || [];
  const side = `<aside class="panel order-side"><span class="eyebrow">Order summary</span><h3>${c.order.summary}</h3><div class="summary-row"><span>${c.order.platform}</span><b>${state.platform}</b></div><div class="summary-row"><span>${c.order.service}</span><b>${state.item || c.order.notSelected}</b></div><div class="summary-row"><span>${c.order.targetVolume}</span><b id="orderQtySummary">${state.plan ? quantity(state.plan.qty) : "-"}</b></div><div class="summary-total"><b>${c.order.total}</b><b id="orderTotalSummary">${state.plan ? money(state.plan.price) : c.order.noAmount}</b></div><p class="small muted">${c.order.secure}</p></aside>`;
  if (state.checkout) {
    return `<main><div class="page-title"><div class="container"><span class="eyebrow">${c.order.checkoutEyebrow}</span><h1>${c.order.checkoutTitle}</h1><p>${c.order.checkoutDescription}</p></div></div><section class="section"><div class="container order-shell"><form class="panel order-main" id="checkoutForm"><div class="progress"><span class="active"></span><span class="active"></span><span class="active"></span></div><div class="checkout-grid">
      <label class="form-group full"><span class="field-label">${c.order.targetUrl}</span><input class="input" name="target" type="url" required placeholder="https://www.instagram.com/youraccount/"><small class="muted">${c.order.targetHint}</small></label>
      <label class="form-group"><span class="field-label">Email *</span><input class="input" name="email" type="email" required placeholder="you@example.com"></label>
      <label class="form-group"><span class="field-label">${c.order.quantity}</span><select class="select" name="quantity"><option value="${state.plan.qty}">${quantity(state.plan.qty)}</option></select></label>
      <div class="form-group full"><span class="field-label">${c.order.payment}</span><div class="radio-row"><label class="radio-card"><input type="radio" name="payment" value="alipay" required><b>${c.order.alipay}</b></label><label class="radio-card"><input type="radio" name="payment" value="wechat"><b>${c.order.wechat}</b></label><label class="radio-card"><input type="radio" name="payment" value="paypal"><b>${c.order.paypal}</b></label></div></div>
      <div class="form-group full"><label class="check-row"><input type="checkbox" checked> ${c.order.remember}</label><label class="check-row"><input type="checkbox" name="terms" required> ${c.order.agree} <a href="/terms" data-link style="color:#0d8f7a">${c.order.terms}</a></label></div>
      <div class="form-group full"><button class="btn btn-coral" style="width:100%" type="submit">${c.order.payButton} · ${money(state.plan.price)}</button></div>
    </div></form>${side}</div></section></main>`;
  }
  return `<main><div class="page-title"><div class="container"><span class="eyebrow">${c.order.orderEyebrow}</span><h1>${c.order.orderTitle}</h1><p>${c.order.orderDescription}</p></div></div><section class="section"><div class="container order-shell"><div class="panel order-main"><div class="progress"><span class="active"></span><span></span><span></span></div>
    <span class="field-label">${c.order.stepPlatform}</span><div class="choice-grid">${platforms().map(p=>`<button class="choice ${state.platform===p.name?"selected":""}" data-select-platform="${p.name}"><b>${p.mark} ${p.name}</b><small>${p.desc.split(",")[0]}</small></button>`).join("")}</div>
    <label><span class="field-label">${c.order.stepService}</span><select class="select" id="itemSelect"><option value="">${c.order.servicePlaceholder}</option>${itemOptions.map(x=>`<option ${state.item===x?"selected":""}>${x}</option>`).join("")}</select></label>
    <div style="margin-top:25px"><span class="field-label">${c.order.stepVolume}</span><div class="plan-grid">${plans.map((p,i)=>`<button class="plan-choice ${!state.plan?.custom && state.plan?.qty===p.qty?"selected":""}" data-plan="${i}"><b>${quantity(p.qty)}</b><span>${money(p.price)}</span><small><s>${money(p.original)}</s> <i class="tag">${c.order.save} ${Math.round((1-p.price/p.original)*100)}%</i></small></button>`).join("")}</div><label class="custom-quantity ${state.plan?.custom ? "selected" : ""}"><span class="field-label">${c.order.customQuantity}</span><input class="input" id="customQty" type="number" min="1" step="1" inputmode="numeric" placeholder="${c.order.customQuantityPlaceholder}" value="${state.plan?.custom ? state.plan.qty : ""}"><small id="customQtyPrice">${state.plan?.custom ? money(state.plan.price) : ""}</small></label></div>
    <div class="notice"><b>${c.order.noticeTitle}</b> ${c.order.notice}</div>
    <button class="btn btn-coral" id="continueBtn" style="width:100%" ${!state.item || !state.plan ? "disabled": ""}>${c.order.continue}</button>
  </div>${side}</div></section></main>`;
}

function servicesPage() {
  const c = t();
  return `<main><div class="page-title"><div class="container"><span class="eyebrow">${c.services.eyebrow}</span><h1>${c.services.title}</h1><p>${c.services.description}</p></div></div><section class="section"><div class="container"><div class="toolbar"><input class="input" id="serviceSearch" placeholder="${c.services.search}"><select class="select" id="serviceFilter"><option>${c.services.all}</option>${platforms().map(p=>`<option>${p.name}</option>`).join("")}</select></div><div class="panel table-wrap"><table class="service-table"><thead><tr><th>${c.services.category}</th><th>${c.services.id}</th><th>${c.services.name}</th><th>${c.services.price}</th><th>${c.services.min}</th><th>${c.services.max}</th><th>${c.services.details}</th></tr></thead><tbody id="serviceBody">${serviceRowMarkup(serviceRows())}</tbody></table></div></div></section></main>`;
}
function serviceRowMarkup(rows) {
  const c = t();
  return rows.map(r=>`<tr><td>${r.category}</td><td>#${r.id}</td><td>${r.name}</td><td>${money(r.price)}</td><td>${r.min.toLocaleString()}</td><td>${r.max.toLocaleString()}</td><td><button class="btn btn-secondary small" data-service-info="${r.id}">${c.services.view}</button></td></tr>`).join("");
}

function faqPage() {
  const c = t();
  return `<main><div class="page-title"><div class="container"><span class="eyebrow">${c.faq.eyebrow}</span><h1>${c.faq.title}</h1><p>${c.faq.description}</p></div></div><section class="section"><div class="container faq-list">${c.faq.items.map((x,i)=>`<div class="faq-item"><button class="faq-question" data-faq="${i}"><span>${x[0]}</span><span>+</span></button><div class="faq-answer">${x[1]}</div></div>`).join("")}</div></section></main>`;

function aboutPage() {
  const c = t();
  return `<main><div class="page-title"><div class="container"><span class="eyebrow">${c.about.eyebrow}</span><h1>${c.about.title}</h1></div></div><section class="section"><div class="container about-layout"><div><h2>${c.about.introTitle}</h2><p class="muted">${c.about.body}</p></div><div class="value-list">${c.about.values.map(x=>`<div class="contact-card"><b>${x[0]}</b><p class="muted">${x[1]}</p></div>`).join("")}</div></div></section></main>`;
}
function contactPage() {
  const c = t();
  return `<main><div class="page-title"><div class="container"><span class="eyebrow">${c.contact.eyebrow}</span><h1>${c.contact.title}</h1><p>${c.contact.description}</p></div></div><section class="section"><div class="container contact-layout"><div><h2>${c.contact.title}</h2><p class="muted">${c.contact.description}</p><div class="contact-points">${c.contact.points.map(x=>`<span><b>${x[0]}</b> ${x[1]}</span>`).join("")}</div><button class="btn btn-teal" id="lineButton">${c.contact.button}</button></div><div class="contact-card"><span class="eyebrow">${c.contact.cardEyebrow}</span><h3>${c.contact.cardTitle}</h3><p class="muted">${c.contact.cardText}</p><div class="notice">${c.contact.notice}</div><img class="contact-qr" src="/assets/contact-qr.jpeg" alt="OnlyFansOne service QR code"></div></div></section></main>`;
}

function authPage(mode) {
  const c = t();
  const content = c.auth[mode];
  return `<main class="auth-wrap"><form class="panel auth-panel" id="authForm"><span class="eyebrow">${c.auth.member}</span><h1>${content[0]}</h1><p class="muted">${content[1]}</p><label class="form-group"><span class="field-label">Email</span><input class="input" type="email" required placeholder="you@example.com"></label>${mode==="forgot"?"":`<label class="form-group"><span class="field-label">${c.auth.password}</span><input class="input" type="password" minlength="8" required placeholder="${c.auth.passwordPlaceholder}"></label>`}${mode==="signup"?`<label class="form-group"><span class="field-label">${c.auth.confirmPassword}</span><input class="input" type="password" minlength="8" required placeholder="${c.auth.confirmPlaceholder}"></label><label class="check-row"><input type="checkbox" required> ${c.auth.agree}</label>`:""}<button class="btn btn-coral">${content[2]}</button><div class="auth-links"><span>${content[3]}</span><a href="${content[4]}" data-link>${content[5]}</a>${mode==="login"?`<a href="/user/auth/forgot-password" data-link>${content[6]}</a>`:""}</div></form></main>`;
}
function legalPage(type) {
  const c = t();
  const privacy = type === "privacy";
  const sections = privacy ? c.legal.privacy : c.legal.terms;
  return `<main><div class="page-title"><div class="container"><span class="eyebrow">${c.legal.eyebrow}</span><h1>${privacy ? c.legal.privacyTitle : c.legal.termsTitle}</h1><p>${c.legal.updated}</p></div></div><section class="section"><article class="container legal">${sections.map(x=>`<h2>${x[0]}</h2><p>${x[1]}</p>`).join("")}</article></section></main>`;
}

function render() {
  syncDocumentMeta();
  captureTracking();
  const page = getPage();
  let content = homePage();
  if (page === "guest/marketing-plans") content = guestPage();
  else if (page === "user/services") content = servicesPage();
  else if (page === "user/faq") content = faqPage();
  else if (page === "about") content = aboutPage();
  else if (page === "contact") content = contactPage();
  else if (page === "user/auth/login") content = authPage("login");
  else if (page === "user/auth/signup") content = authPage("signup");
  else if (page === "user/auth/forgot-password") content = authPage("forgot");
  else if (page === "privacy") content = legalPage("privacy");
  else if (page === "terms") content = legalPage("terms");
  document.querySelector("#app").innerHTML = header() + content + footer();
  bindEvents();
}

function bindEvents() {
  document.querySelectorAll("[data-link]").forEach(el => el.addEventListener("click", e => {
    e.preventDefault();
    const url = new URL(el.href, location.origin);
    if (el.dataset.platform && itemsByPlatform()[el.dataset.platform]) {
      state.platform = el.dataset.platform; state.item = ""; state.plan = null; state.checkout = false; state.complete = false;
    }
    go(url.pathname + url.search + url.hash);
  }));
  document.querySelector("#languageToggle")?.addEventListener("click", () => {
    state.lang = state.lang === "en" ? "zh" : "en";
    localStorage.setItem("onlyfansone_lang", state.lang);
    state.item = "";
    render();
  });
  document.querySelector("#menuButton")?.addEventListener("click", () => document.querySelector("#navLinks").classList.toggle("open"));
  document.querySelectorAll("[data-select-platform]").forEach(el => el.addEventListener("click", () => { state.platform = el.dataset.selectPlatform; state.item = ""; state.plan = null; render(); }));
  document.querySelector("#itemSelect")?.addEventListener("change", e => { state.item = e.target.value; render(); });
  document.querySelectorAll("[data-plan]").forEach(el => el.addEventListener("click", () => { state.plan = { ...plans[Number(el.dataset.plan)], custom: false }; render(); }));
  document.querySelector("#customQty")?.addEventListener("input", e => {
    state.plan = e.target.value ? planForQuantity(e.target.value, true) : null;
    document.querySelectorAll(".plan-choice.selected").forEach(el => el.classList.remove("selected"));
    e.target.closest(".custom-quantity")?.classList.toggle("selected", Boolean(state.plan));
    const price = document.querySelector("#customQtyPrice");
    if (price) price.textContent = state.plan ? money(state.plan.price) : "";
    const qtySummary = document.querySelector("#orderQtySummary");
    if (qtySummary) qtySummary.textContent = state.plan ? quantity(state.plan.qty) : "-";
    const totalSummary = document.querySelector("#orderTotalSummary");
    if (totalSummary) totalSummary.textContent = state.plan ? money(state.plan.price) : t().order.noAmount;
    const continueButton = document.querySelector("#continueBtn");
    if (continueButton) continueButton.disabled = !state.item || !state.plan;
  });
  document.querySelector("#continueBtn")?.addEventListener("click", () => { state.checkout = true; render(); window.scrollTo({top:0}); });
  document.querySelector("#checkoutForm")?.addEventListener("submit", e => { e.preventDefault(); state.complete = true; render(); window.scrollTo({top:0}); });
  document.querySelectorAll("[data-faq]").forEach(el => el.addEventListener("click", () => el.closest(".faq-item").classList.toggle("open")));
  document.querySelectorAll("[data-service-info]").forEach(el => el.addEventListener("click", () => toast(t().toast.service.replace("{id}", el.dataset.serviceInfo))));
  document.querySelector("#lineButton")?.addEventListener("click", () => toast(t().toast.line));
  document.querySelector("#authForm")?.addEventListener("submit", e => { e.preventDefault(); toast(t().toast.auth); });
  const search = document.querySelector("#serviceSearch");
  const filter = document.querySelector("#serviceFilter");
  const updateServices = () => {
    const term = search.value.toLowerCase();
    const p = filter.value;
    const allLabel = t().services.all;
    const rows = serviceRows().filter(r => (!term || `${r.category} ${r.name} ${r.id}`.toLowerCase().includes(term)) && (p === allLabel || r.name.includes(p)));
    document.querySelector("#serviceBody").innerHTML = serviceRowMarkup(rows);
    document.querySelectorAll("[data-service-info]").forEach(el => el.addEventListener("click", () => toast(t().toast.service.replace("{id}", el.dataset.serviceInfo))));
  };
  search?.addEventListener("input", updateServices);
  filter?.addEventListener("change", updateServices);
  animateCounters();
}

function splitMetric(value) {
  const match = String(value).match(/^([\d.]+)(.*)$/);
  if (!match) return { target: 0, decimals: 0, suffix: "" };
  const target = Number(match[1]);
  const decimals = match[1].includes(".") ? match[1].split(".")[1].length : 0;
  return { target, decimals, suffix: match[2] };
}

function animateCounter(el) {
  if (el.dataset.done === "true") return;
  el.dataset.done = "true";
  const metric = splitMetric(el.dataset.count);
  const duration = 1400;
  const started = performance.now();
  const tick = now => {
    const progress = Math.min((now - started) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const value = metric.target * eased;
    el.textContent = `${value.toFixed(metric.decimals)}${metric.suffix}`;
    if (progress < 1) requestAnimationFrame(tick);
    else el.textContent = el.dataset.count;
  };
  requestAnimationFrame(tick);
}

function animateCounters() {
  const counters = [...document.querySelectorAll(".count-up")];
  if (!counters.length) return;
  if (!("IntersectionObserver" in window)) {
    counters.forEach(animateCounter);
    return;
  }
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      animateCounter(entry.target);
      observer.unobserve(entry.target);
    });
  }, { threshold: .35 });
  counters.forEach(el => observer.observe(el));
}

window.addEventListener("popstate", render);
window.addEventListener("hashchange", render);
render();

</script>
